name: new scraper

on:
  workflow_dispatch:
    inputs:
      dates:
        description: 'Show dates, comma-separated (YYYYMMDD)'
        required: false
        default: '20260724'
      venue_code:
        description: 'BMS venue code'
        required: false
        default: 'BWCB'
      event_code:
        description: 'BMS event code (movie)'
        required: false
        default: 'ET00480917'
      region_code:
        description: 'BMS region/subregion code'
        required: false
        default: 'CBE'
      screen_filter:
        description: 'Screen attribute label to filter on (e.g. "IMAX SCREEN", "PCX SCREEN")'
        required: false
        default: 'IMAX Laser 12.1'
      venue_label:
        description: 'Human-readable venue name for the notification text'
        required: false
        default: 'Broadway Cinemas Coimbatore (IMAX)'
      latitude:
        description: 'Latitude for the venue city (for BMS headers)'
        required: false
        default: '11.016845'
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

concurrency:
  group: bms-scraper
  cancel-in-progress: false

jobs:
  poll-bms:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      BMS_DATES: ${{ github.event.inputs.dates || vars.BMS_DATES }}
      BMS_VENUE_CODE: ${{ github.event.inputs.venue_code || vars.BMS_VENUE_CODE }}
      BMS_EVENT_CODE: ${{ github.event.inputs.event_code || vars.BMS_EVENT_CODE }}
      BMS_REGION_CODE: ${{ github.event.inputs.region_code || vars.BMS_REGION_CODE }}
      BMS_SCREEN_FILTER: ${{ github.event.inputs.screen_filter || vars.BMS_SCREEN_FILTER }}
      BMS_VENUE_LABEL: ${{ github.event.inputs.venue_label || vars.BMS_VENUE_LABEL }}
      BMS_LATITUDE: ${{ github.event.inputs.latitude || vars.BMS_LATITUDE }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Python Dependencies
        run: pip install requests curl-cffi

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase true

      - name: Install and Setup Cloudflare WARP
        run: |
          # Add Cloudflare GPG key and repo
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          # Install WARP
          sudo apt-get update
          sudo apt-get install cloudflare-warp -y
          
          # Configure WARP in proxy mode (--accept-tos bypasses the interactive prompt)
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          
          # Wait a few seconds for the connection to establish
          sleep 5
          warp-cli --accept-tos status
          
          # Test the proxy to ensure it's routing through Cloudflare
          curl -x socks5://127.0.0.1:40000 https://1.1.1.1/cdn-cgi/trace | grep warp || echo "WARP Test Failed, but continuing..."

      - name: Run Polling Script
        run: python -u run_scraper.py
